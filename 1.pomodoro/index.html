<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="timer-card">
            <!-- ヘッダー -->
            <div class="header">
                <h1>ポモドーロタイマー</h1>
                <div class="window-controls">
                    <button class="control-btn">−</button>
                    <button class="control-btn">□</button>
                    <button class="control-btn">×</button>
                </div>
            </div>

            <!-- モード表示 -->
            <div class="mode-display" id="modeDisplay">作業中</div>

            <!-- タイマー表示 -->
            <div class="timer-display">
                <svg class="progress-ring" width="280" height="280">
                    <circle class="progress-ring-bg" cx="140" cy="140" r="120" />
                    <circle class="progress-ring-circle" id="progressCircle" cx="140" cy="140" r="120" />
                </svg>
                <div class="time-text" id="timeDisplay">25:00</div>
            </div>

            <!-- コントロールボタン -->
            <div class="controls">
                <button class="btn btn-primary" id="startBtn">開始</button>
                <button class="btn btn-secondary" id="resetBtn">リセット</button>
            </div>

            <!-- 進捗表示 -->
            <div class="progress-section">
                <h2>今日の進捗</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="completedCount">0</div>
                        <div class="stat-label">完了</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="focusTime">0分</div>
                        <div class="stat-label">集中時間</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="timer_engine.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
