<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー - ゲーミフィケーション版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .user-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .xp-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .xp-progress {
            background: linear-gradient(90deg, #4caf50 0%, #8bc34a 100%);
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .timer-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .timer-display {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
        }
        
        .task-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 15px;
        }
        
        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-success {
            background: #4caf50;
            color: white;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .btn-secondary {
            background: #9e9e9e;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .badge-card {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .badge-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .badge-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .badge-desc {
            font-size: 0.85em;
            opacity: 0.9;
        }
        
        .chart-container {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .chart-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 150px;
            gap: 5px;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 5px 5px 0 0;
            min-height: 5px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-size: 0.9em;
            font-weight: bold;
            padding-bottom: 5px;
        }
        
        .chart-labels {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 0.85em;
            color: #666;
        }
        
        .chart-label {
            flex: 1;
            text-align: center;
        }
        
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .notification.level-up {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .notification.badge-earned {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
        }
        
        .notification-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .notification-content {
            font-size: 1em;
        }
        
        .streak-display {
            text-align: center;
            font-size: 1.2em;
            margin: 15px 0;
        }
        
        .streak-fire {
            font-size: 2em;
            animation: pulse 1s ease infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍅 ポモドーロタイマー</h1>
            <p>ゲーミフィケーション版 - 集中力でレベルアップ！</p>
        </div>
        
        <div class="user-info">
            <h2>プレイヤー情報</h2>
            <div class="user-stats">
                <div class="stat-card">
                    <span class="stat-value" id="user-level">1</span>
                    <span class="stat-label">レベル</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="user-xp">0</span>
                    <span class="stat-label">XP</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="current-streak">0</span>
                    <span class="stat-label">連続日数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="total-sessions">0</span>
                    <span class="stat-label">総完了数</span>
                </div>
            </div>
            <div class="xp-bar">
                <div class="xp-progress" id="xp-progress" style="width: 0%">
                    <span id="xp-progress-text">0 / 0 XP</span>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="timer-section">
                <h2>タイマー</h2>
                <div class="streak-display">
                    <span class="streak-fire" id="streak-fire">🔥</span>
                    <span id="streak-text">ストリーク: 0日</span>
                </div>
                <div class="timer-display" id="timer-display">25:00</div>
                <input type="text" class="task-input" id="task-input" placeholder="今回のタスク名（任意）">
                <div class="timer-controls">
                    <button class="btn btn-primary" id="start-btn" onclick="startTimer()">スタート</button>
                    <button class="btn btn-danger" id="stop-btn" onclick="stopTimer()" disabled>停止</button>
                    <button class="btn btn-secondary" id="reset-btn" onclick="resetTimer()">リセット</button>
                    <button class="btn btn-success" id="complete-btn" onclick="completePomodoro()" disabled>完了</button>
                </div>
            </div>
            
            <div class="stats-section">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('badges', event)">バッジ</button>
                    <button class="tab" onclick="switchTab('statistics', event)">統計</button>
                    <button class="tab" onclick="switchTab('history', event)">履歴</button>
                </div>
                
                <div id="badges-tab" class="tab-content active">
                    <h3>獲得バッジ</h3>
                    <div class="badges-grid" id="badges-list">
                        <p style="text-align: center; color: #999; padding: 20px;">
                            まだバッジがありません。<br>ポモドーロを完了してバッジを獲得しよう！
                        </p>
                    </div>
                </div>
                
                <div id="statistics-tab" class="tab-content">
                    <h3>週間統計</h3>
                    <div class="user-stats" style="margin-top: 15px;">
                        <div class="stat-card">
                            <span class="stat-value" id="week-sessions">0</span>
                            <span class="stat-label">完了セッション</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value" id="week-minutes">0</span>
                            <span class="stat-label">集中時間(分)</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h4>過去7日間の完了数</h4>
                        <div class="chart-bars" id="daily-chart-bars"></div>
                        <div class="chart-labels" id="daily-chart-labels"></div>
                    </div>
                </div>
                
                <div id="history-tab" class="tab-content">
                    <h3>最近の履歴</h3>
                    <div class="history-list" id="history-list">
                        <p style="text-align: center; color: #999; padding: 20px;">
                            履歴がありません
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let timerInterval = null;
        let timeRemaining = 25 * 60; // seconds
        let isRunning = false;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadUserData();
            loadBadges();
            loadStatistics();
            loadHistory();
        });
        
        // Timer functions
        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            document.getElementById('complete-btn').disabled = false;
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    stopTimer();
                    playNotificationSound();
                    showNotification('タイマー終了！', 'ポモドーロを完了しました。休憩を取りましょう！');
                }
            }, 1000);
        }
        
        function stopTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            document.getElementById('start-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('complete-btn').disabled = true;
        }
        
        function resetTimer() {
            stopTimer();
            timeRemaining = 25 * 60;
            updateTimerDisplay();
        }
        
        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('timer-display').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        async function completePomodoro() {
            stopTimer();
            
            const taskName = document.getElementById('task-input').value;
            const duration = 25;
            
            try {
                const response = await fetch('/api/complete-pomodoro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ duration, task_name: taskName })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // XP獲得通知
                    showNotification(
                        `+${data.xp_result.xp_earned} XP 獲得！`,
                        `ベース: ${data.xp_result.base_xp} XP` + 
                        (data.xp_result.bonus_xp > 0 ? ` + ボーナス: ${data.xp_result.bonus_xp} XP` : '')
                    );
                    
                    // レベルアップ通知
                    if (data.xp_result.level_up) {
                        setTimeout(() => {
                            showNotification(
                                `🎉 レベルアップ！`,
                                `レベル ${data.xp_result.new_level} に到達しました！`,
                                'level-up'
                            );
                        }, 2000);
                    }
                    
                    // バッジ獲得通知
                    if (data.new_badges && data.new_badges.length > 0) {
                        data.new_badges.forEach((badge, index) => {
                            setTimeout(() => {
                                showNotification(
                                    `🏆 バッジ獲得！`,
                                    `${badge.name}: ${badge.description}`,
                                    'badge-earned'
                                );
                            }, 3000 + index * 2000);
                        });
                    }
                    
                    // データ更新
                    setTimeout(() => {
                        loadUserData();
                        loadBadges();
                        loadStatistics();
                        loadHistory();
                    }, 500);
                    
                    // タスク入力をクリア
                    document.getElementById('task-input').value = '';
                    resetTimer();
                }
            } catch (error) {
                console.error('Error completing pomodoro:', error);
                showNotification('エラー', '完了処理に失敗しました');
            }
        }
        
        // Data loading functions
        async function loadUserData() {
            try {
                const response = await fetch('/api/user');
                const user = await response.json();
                
                document.getElementById('user-level').textContent = user.level;
                document.getElementById('user-xp').textContent = user.xp;
                document.getElementById('current-streak').textContent = user.current_streak;
                document.getElementById('total-sessions').textContent = user.total_sessions;
                
                // XPプログレスバー
                const xpProgress = document.getElementById('xp-progress');
                xpProgress.style.width = user.xp_progress_percent + '%';
                document.getElementById('xp-progress-text').textContent = 
                    `${user.xp_in_current_level} / ${user.xp_for_next_level} XP`;
                
                // ストリーク表示
                document.getElementById('streak-text').textContent = `ストリーク: ${user.current_streak}日`;
                const streakFire = document.getElementById('streak-fire');
                if (user.current_streak >= 7) {
                    streakFire.textContent = '🔥🔥🔥';
                } else if (user.current_streak >= 3) {
                    streakFire.textContent = '🔥🔥';
                } else if (user.current_streak > 0) {
                    streakFire.textContent = '🔥';
                } else {
                    streakFire.textContent = '❄️';
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        async function loadBadges() {
            try {
                const response = await fetch('/api/badges');
                const badges = await response.json();
                
                const badgesList = document.getElementById('badges-list');
                
                if (badges.length === 0) {
                    badgesList.innerHTML = `
                        <p style="text-align: center; color: #999; padding: 20px;">
                            まだバッジがありません。<br>ポモドーロを完了してバッジを獲得しよう！
                        </p>
                    `;
                } else {
                    badgesList.innerHTML = badges.map(badge => `
                        <div class="badge-card">
                            <div class="badge-icon">${badge.name.split(' ')[0]}</div>
                            <div class="badge-name">${badge.name}</div>
                            <div class="badge-desc">${badge.description}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading badges:', error);
            }
        }
        
        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics');
                const stats = await response.json();
                
                // 週間統計
                document.getElementById('week-sessions').textContent = stats.week?.total_sessions || 0;
                document.getElementById('week-minutes').textContent = stats.week?.total_minutes || 0;
                
                // 日別グラフ
                const chartBars = document.getElementById('daily-chart-bars');
                const chartLabels = document.getElementById('daily-chart-labels');
                
                if (stats.daily_completions && stats.daily_completions.length > 0) {
                    const maxCount = Math.max(...stats.daily_completions.map(d => d.count), 1);
                    
                    chartBars.innerHTML = stats.daily_completions.map(day => {
                        const height = (day.count / maxCount) * 100;
                        return `<div class="chart-bar" style="height: ${height}%">${day.count || ''}</div>`;
                    }).join('');
                    
                    chartLabels.innerHTML = stats.daily_completions.map(day => 
                        `<div class="chart-label">${day.date}</div>`
                    ).join('');
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const sessions = await response.json();
                
                const historyList = document.getElementById('history-list');
                
                if (sessions.length === 0) {
                    historyList.innerHTML = `
                        <p style="text-align: center; color: #999; padding: 20px;">
                            履歴がありません
                        </p>
                    `;
                } else {
                    historyList.innerHTML = sessions.map(session => {
                        const date = new Date(session.completed_at);
                        const dateStr = date.toLocaleString('ja-JP', { 
                            month: 'short', 
                            day: 'numeric', 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });
                        
                        return `
                            <div class="history-item">
                                <div>
                                    <strong>${session.task_name || 'タスクなし'}</strong><br>
                                    <small>${dateStr} - ${session.duration}分</small>
                                </div>
                                <div style="color: #4caf50; font-weight: bold;">
                                    +${session.xp_earned} XP
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        // UI functions
        function switchTab(tabName, event) {
            // Remove active class from all tabs and contents
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Add active class to selected tab and content
            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
            
            // Reload data for the selected tab
            if (tabName === 'statistics') {
                loadStatistics();
            } else if (tabName === 'history') {
                loadHistory();
            }
        }
        
        function showNotification(title, content, type = 'default') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div class="notification-title">${title}</div>
                <div class="notification-content">${content}</div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }
        
        function playNotificationSound() {
